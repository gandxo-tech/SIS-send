<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Envoyer un message anonyme — SIS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <meta name="theme-color" content="#FAFAFC" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#121218" media="(prefers-color-scheme: dark)">
  <script>
    (function () {
      var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      document.documentElement.setAttribute('data-theme', prefersDark ? 'dark' : 'light');
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --brand-1: #4F46E5;
      --brand-2: #7C3AED;
      --brand-text: #5B4FE0;
      --brand-tint: rgba(79, 70, 229, 0.10);
      --brand-ring: rgba(79, 70, 229, 0.35);

      --bg: #FAFAFC;
      --surface: #FFFFFF;
      --ink: #15151C;
      --ink-soft: #6B6A78;
      --card-border: rgba(21, 21, 28, 0.08);
      --chip-bg: #F1F0F6;

      --success: #16A34A;
      --success-tint: rgba(22, 163, 74, 0.12);
      --warning: #B5690A;
      --danger: #DC2680;
      --danger-tint: rgba(220, 38, 128, 0.12);

      --shadow-card: 0 20px 40px -14px rgba(79, 70, 229, 0.20), 0 2px 10px rgba(15, 15, 25, 0.05);
      --shadow-btn: 0 10px 22px -6px rgba(79, 70, 229, 0.40);
      --shadow-soft: 0 2px 8px rgba(15, 15, 25, 0.05);

      --radius-lg: 24px;
      --radius-md: 16px;
      --radius-sm: 12px;
      --radius-pill: 999px;
    }

    html[data-theme="dark"] {
      --brand-text: #A78BFA;
      --brand-tint: rgba(139, 92, 246, 0.16);
      --brand-ring: rgba(139, 92, 246, 0.45);

      --bg: #121218;
      --surface: #1C1C25;
      --ink: #F2F1F7;
      --ink-soft: #9B9AA8;
      --card-border: rgba(242, 241, 247, 0.08);
      --chip-bg: #24242E;

      --success: #34D399;
      --success-tint: rgba(52, 211, 153, 0.14);
      --warning: #FFB84D;
      --danger: #FB7BB5;
      --danger-tint: rgba(251, 123, 181, 0.14);

      --shadow-card: 0 20px 44px -12px rgba(139, 92, 246, 0.35), 0 2px 10px rgba(0, 0, 0, 0.35);
      --shadow-btn: 0 10px 26px -4px rgba(139, 92, 246, 0.5);
      --shadow-soft: 0 2px 10px rgba(0, 0, 0, 0.3);
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
    }

    html, body { min-height: 100%; }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: var(--bg);
      color: var(--ink);
      transition: background-color .3s ease, color .3s ease;
      min-height: 100vh;
      min-height: 100dvh;
      position: relative;
      overflow-x: hidden;
    }

    .glow {
      position: fixed;
      border-radius: 50%;
      filter: blur(70px);
      pointer-events: none;
      z-index: 0;
      opacity: .5;
    }

    .glow-1 { width: 280px; height: 280px; top: -80px; right: -100px; background: var(--brand-1); }
    .glow-2 { width: 240px; height: 240px; bottom: 10%; left: -110px; background: var(--brand-2); opacity: .35; }

    :focus-visible {
      outline: 3px solid var(--brand-text);
      outline-offset: 2px;
    }

    .page {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 14px 16px 40px;
      position: relative;
      z-index: 1;
    }

    .theme-toggle {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 2;
    }

    .brand {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 10px 0 24px;
    }

    .brand-text {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 30px;
      letter-spacing: -0.01em;
      background: linear-gradient(135deg, var(--brand-1), var(--brand-2));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .theme-toggle {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1px solid var(--card-border);
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: var(--shadow-soft);
      transition: transform .15s ease, box-shadow .15s ease;
      color: var(--ink);
    }

    .theme-toggle:active { transform: scale(.92); }

    .theme-toggle svg {
      width: 19px;
      height: 19px;
      position: absolute;
      inset: 0;
      margin: auto;
      transition: opacity .25s ease, transform .35s ease;
    }

    .icon-sun { opacity: 1; transform: rotate(0) scale(1); }
    .icon-moon { opacity: 0; transform: rotate(-90deg) scale(.4); }
    html[data-theme="dark"] .icon-sun { opacity: 0; transform: rotate(90deg) scale(.4); }
    html[data-theme="dark"] .icon-moon { opacity: 1; transform: rotate(0) scale(1); }

    .wrap { width: 100%; max-width: 440px; }

    .hero { text-align: center; padding: 4px 6px 26px; }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--brand-tint);
      border: 1px solid transparent;
      padding: 6px 14px;
      border-radius: var(--radius-pill);
      font-size: 11.5px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--brand-text);
      margin-bottom: 22px;
    }

    .badge svg { flex-shrink: 0; }

    .avatar {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      margin: 0 auto 18px;
      background: linear-gradient(135deg, var(--brand-1), var(--brand-2));
      border: 3px solid var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 32px;
      color: #FFFFFF;
      position: relative;
      overflow: hidden;
      box-shadow: 0 12px 28px -8px var(--brand-ring);
    }

    .avatar-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      position: absolute;
      inset: 0;
      border-radius: 50%;
    }

    .username {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: clamp(21px, 6vw, 25px);
      letter-spacing: -0.01em;
      margin-bottom: 12px;
    }

    .headline {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      font-size: clamp(19px, 5.5vw, 23px);
      line-height: 1.35;
      letter-spacing: -0.01em;
      color: var(--ink);
      max-width: 340px;
      margin: 0 auto;
    }

    .headline .hl {
      background: var(--brand-tint);
      color: var(--brand-text);
      padding: 1px 8px;
      border-radius: 6px;
      box-decoration-break: clone;
      -webkit-box-decoration-break: clone;
    }

    .chips {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 2px 2px 22px;
      scrollbar-width: none;
    }

    .chips::-webkit-scrollbar { display: none; }

    .suggestion-btn {
      flex: 0 0 auto;
      background: var(--surface);
      border: 1px solid var(--card-border);
      padding: 9px 16px;
      border-radius: var(--radius-pill);
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 600;
      font-size: 13.5px;
      color: var(--ink);
      cursor: pointer;
      box-shadow: var(--shadow-soft);
      transition: transform .15s ease, box-shadow .15s ease, background .2s ease, border-color .2s ease;
      white-space: nowrap;
    }

    .suggestion-btn:hover { background: var(--brand-tint); color: var(--brand-text); border-color: transparent; }

    .suggestion-btn:active { transform: scale(.96); }

    .composer {
      background: var(--surface);
      border: 1px solid var(--card-border);
      border-radius: var(--radius-lg);
      padding: 22px 20px 20px;
      box-shadow: var(--shadow-card);
      transition: box-shadow .3s ease, transform .3s ease;
      animation: settle .5s ease-out .1s backwards;
    }

    @keyframes settle {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .composer:focus-within { transform: translateY(-2px); }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: var(--ink-soft);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 12px;
    }

    .emoji-bar {
      display: flex;
      gap: 6px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .emoji-btn {
      background: var(--chip-bg);
      border: 1px solid transparent;
      width: 40px;
      height: 40px;
      border-radius: 11px;
      font-size: 18px;
      cursor: pointer;
      transition: all .15s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .emoji-btn:hover { background: var(--brand-tint); transform: translateY(-2px); }

    .input-field {
      width: 100%;
      padding: 14px 15px;
      background: var(--bg);
      border: 1px solid var(--card-border);
      border-radius: var(--radius-sm);
      font-size: 15px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      color: var(--ink);
      transition: box-shadow .2s ease, border-color .2s ease;
    }

    .input-field::placeholder { color: var(--ink-soft); }

    .input-field:focus {
      outline: none;
      border-color: transparent;
      box-shadow: 0 0 0 3px var(--brand-tint), 0 0 0 1px var(--brand-1) inset;
    }

    textarea.input-field { min-height: 130px; resize: vertical; line-height: 1.5; }

    .char-counter {
      text-align: right;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--ink-soft);
      margin-top: 8px;
    }

    .char-counter.warning { color: var(--warning); }
    .char-counter.danger { color: var(--danger); }

    .btn-send {
      width: 100%;
      margin-top: 18px;
      padding: 17px;
      background: linear-gradient(135deg, var(--brand-1), var(--brand-2));
      color: #FFFFFF;
      border: none;
      border-radius: var(--radius-md);
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 16.5px;
      letter-spacing: -0.01em;
      cursor: pointer;
      box-shadow: var(--shadow-btn);
      transition: transform .15s ease, box-shadow .15s ease, opacity .2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
    }

    .btn-send:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 14px 28px -6px var(--brand-ring);
    }

    .btn-send:active:not(:disabled) { transform: scale(.98); }

    .btn-send:disabled { opacity: 0.55; cursor: not-allowed; }

    .btn-send.sending svg { animation: spin .6s linear infinite; }

    @keyframes spin { to { transform: rotate(360deg); } }

    .notification {
      display: none;
      margin-top: 16px;
      background: var(--success-tint);
      color: var(--success);
      border: 1px solid transparent;
      border-radius: var(--radius-md);
      padding: 16px;
      text-align: center;
      font-weight: 600;
      font-size: 14px;
      animation: slideDown .3s ease-out;
    }

    .notification.error { background: var(--danger-tint); color: var(--danger); }

    .notification a { color: inherit; font-weight: 700; text-decoration: underline; }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .confetti {
      position: fixed;
      top: -10px;
      width: 8px;
      height: 8px;
      border-radius: 2px;
      animation: confetti-fall 2.5s ease-out forwards;
      z-index: 1000;
    }

    @keyframes confetti-fall {
      to { transform: translateY(100vh) rotate(360deg); opacity: 0; }
    }

    .footer { margin-top: 36px; text-align: center; }

    .footer p { font-size: 13px; color: var(--ink-soft); margin-bottom: 12px; }

    .footer-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--card-border);
      padding: 10px 20px;
      border-radius: var(--radius-pill);
      font-weight: 700;
      font-size: 14px;
      color: var(--ink);
      text-decoration: none;
      background: var(--surface);
      box-shadow: var(--shadow-soft);
      transition: transform .15s ease, box-shadow .15s ease, background .2s ease, color .2s ease;
    }

    .footer-link:hover { background: var(--brand-tint); color: var(--brand-text); }

    .footer-link:active { transform: scale(.96); }

    @media (max-width: 380px) {
      .avatar { width: 76px; height: 76px; font-size: 28px; }
      .composer { padding: 18px 16px 16px; }
      .username { font-size: 20px; }
      .headline { font-size: 18px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="glow glow-1" aria-hidden="true"></div>
    <div class="glow glow-2" aria-hidden="true"></div>
    <button type="button" class="theme-toggle" id="themeToggle" aria-label="Changer de theme" aria-pressed="false">
      <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"></circle><line x1="12" y1="2" x2="12" y2="4"></line><line x1="12" y1="20" x2="12" y2="22"></line><line x1="4.2" y1="4.2" x2="5.6" y2="5.6"></line><line x1="18.4" y1="18.4" x2="19.8" y2="19.8"></line><line x1="2" y1="12" x2="4" y2="12"></line><line x1="20" y1="12" x2="22" y2="12"></line><line x1="4.2" y1="19.8" x2="5.6" y2="18.4"></line><line x1="18.4" y1="5.6" x2="19.8" y2="4.2"></line></svg>
      <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
    </button>

    <main class="wrap">
      <div class="brand">
        <span class="brand-text">SIS</span>
      </div>

      <section class="hero">
        <span class="badge">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
          100% anonyme
        </span>

        <div class="avatar" id="avatarContainer">
          <span id="avatarText">U</span>
        </div>

        <h1 class="username" id="userName">@user</h1>

        <p class="headline">Balance <span class="hl">ce que tu penses vraiment</span>. Personne ne saura que c'est toi. 🤫</p>
      </section>

      <div class="chips">
        <button class="suggestion-btn" data-text="Qu'est-ce que tu penses vraiment de moi ? 🤔">🤔 Opinion</button>
        <button class="suggestion-btn" data-text="Compliment ou critique ? 😏">😏 Feedback</button>
        <button class="suggestion-btn" data-text="Un secret à partager ? 🤫">🤫 Secret</button>
      </div>

      <form id="messageForm">
        <input type="text" id="receiver" hidden>

        <div class="composer">
          <label class="form-label" for="messageInput">Ton message</label>

          <div class="emoji-bar">
            <button type="button" class="emoji-btn" data-emoji="😊">😊</button>
            <button type="button" class="emoji-btn" data-emoji="❤️">❤️</button>
            <button type="button" class="emoji-btn" data-emoji="🔥">🔥</button>
            <button type="button" class="emoji-btn" data-emoji="💯">💯</button>
            <button type="button" class="emoji-btn" data-emoji="👀">👀</button>
            <button type="button" class="emoji-btn" data-emoji="✨">✨</button>
          </div>

          <textarea id="messageInput" class="input-field" placeholder="Écris ton message ici..." required maxlength="5000"></textarea>

          <div class="char-counter" id="charCounter">0 / 5000</div>
        </div>

        <button type="submit" class="btn-send">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
          <span class="btn-label">Envoyer</span>
        </button>
      </form>

      <div id="notif" class="notification" aria-live="polite"></div>

      <footer class="footer">
        <p>Toi aussi, reçois des messages anonymes ?</p>
        <a class="footer-link" href="https://sis-say-it-safely.vercel.app/">Crée ton lien SIS →</a>
      </footer>
    </main>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";
    import { getDatabase, ref as dbRef, get } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBqk3L_qkolD41H3yvHEzz4O-Sr15I-Tko",
      authDomain: "gandxoanonymous.firebaseapp.com",
      projectId: "gandxoanonymous",
      storageBucket: "gandxoanonymous.appspot.com",
      messagingSenderId: "836606625364",
      appId: "1:836606625364:web:7150571998131c41c0cfc1",
      measurementId: "G-97TCHJ33KW",
      databaseURL: "https://gandxoanonymous-default-rtdb.firebaseio.com"
    };

    const CLOUDINARY_CLOUD_NAME = 'duddyzckz';

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const database = getDatabase(app);

    const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    const urlParams = new URLSearchParams(window.location.search);
    const toPseudo = urlParams.get("to");
    const receiverInput = document.getElementById("receiver");
    const messageInput = document.getElementById("messageInput");
    const charCounter = document.getElementById("charCounter");
    const avatarContainer = document.getElementById("avatarContainer");
    const avatarText = document.getElementById("avatarText");
    const userName = document.getElementById("userName");

    if (toPseudo) {
      receiverInput.value = "@" + decodeURIComponent(toPseudo);
      userName.textContent = "@" + decodeURIComponent(toPseudo);
      avatarText.textContent = toPseudo.charAt(0).toUpperCase();

      loadUserProfile(toPseudo);
    }

    async function loadUserProfile(pseudo) {
      try {
        const usersRef = dbRef(database, 'users');
        const snapshot = await get(usersRef);

        if (snapshot.exists()) {
          const users = snapshot.val();
          for (const uid in users) {
            if (users[uid].pseudo === pseudo) {
              const userData = users[uid];

              if (userData.cloudinaryPublicId) {
                const cloudinaryUrl = `https://res.cloudinary.com/${CLOUDINARY_CLOUD_NAME}/image/upload/${userData.cloudinaryPublicId}`;
                const img = document.createElement('img');
                img.src = cloudinaryUrl;
                img.className = 'avatar-img';
                img.alt = pseudo;
                avatarContainer.appendChild(img);
              }

              break;
            }
          }
        }
      } catch (error) {
        console.error("Erreur:", error);
      }
    }

    messageInput.addEventListener("input", () => {
      const length = messageInput.value.length;
      charCounter.textContent = `${length} / 5000`;

      charCounter.classList.remove("warning", "danger");
      if (length > 4000) charCounter.classList.add("warning");
      if (length > 4800) charCounter.classList.add("danger");
    });

    document.querySelectorAll(".suggestion-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        messageInput.value = btn.dataset.text;
        messageInput.focus();
        messageInput.dispatchEvent(new Event("input"));
      });
    });

    document.querySelectorAll(".emoji-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        const emoji = btn.dataset.emoji;
        const pos = messageInput.selectionStart;
        const before = messageInput.value.substring(0, pos);
        const after = messageInput.value.substring(pos);

        messageInput.value = before + emoji + after;
        messageInput.focus();
        messageInput.setSelectionRange(pos + emoji.length, pos + emoji.length);
        messageInput.dispatchEvent(new Event("input"));
      });
    });

    function createConfetti() {
      const colors = ["#4F46E5", "#7C3AED", "#818CF8", "#C4B5FD"];
      for (let i = 0; i < 20; i++) {
        setTimeout(() => {
          const c = document.createElement("div");
          c.classList.add("confetti");
          c.style.left = Math.random() * window.innerWidth + "px";
          c.style.background = colors[Math.floor(Math.random() * colors.length)];
          c.style.animationDelay = Math.random() * 0.3 + "s";
          document.body.appendChild(c);
          setTimeout(() => c.remove(), 2500);
        }, i * 20);
      }
    }

    function showNotice(html, type) {
      const notif = document.getElementById("notif");
      notif.innerHTML = html;
      notif.classList.toggle("error", type === "error");
      notif.style.display = "block";
      clearTimeout(showNotice._t);
      showNotice._t = setTimeout(() => {
        notif.style.display = "none";
        notif.classList.remove("error");
      }, 6000);
    }

    document.getElementById("messageForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const msg = messageInput.value.trim();
      const btn = document.querySelector('.btn-send');
      const btnLabel = btn.querySelector('.btn-label');

      if (!msg) {
        showNotice("📝 Écris un message avant d'envoyer.", "error");
        return;
      }
      if (!toPseudo) {
        showNotice("😔 Destinataire introuvable.", "error");
        return;
      }

      btn.disabled = true;
      btn.classList.add('sending');
      btnLabel.textContent = "Envoi...";

      try {
        await addDoc(collection(db, "messages"), {
          to: toPseudo,
          message: msg,
          createdAt: serverTimestamp()
        });

        messageInput.value = "";
        charCounter.textContent = "0 / 5000";
        charCounter.classList.remove("warning", "danger");

        if (!reduceMotion) createConfetti();

        showNotice(`✅ Message envoyé !<br><a href="https://sis-say-it-safely.vercel.app/">Crée ton lien SIS →</a>`, "success");
      } catch (error) {
        showNotice("❌ Erreur : " + error.message, "error");
      } finally {
        btn.disabled = false;
        btn.classList.remove('sending');
        btnLabel.textContent = "Envoyer";
      }
    });

    const themeToggleBtn = document.getElementById('themeToggle');
    themeToggleBtn.setAttribute('aria-pressed', String(document.documentElement.getAttribute('data-theme') === 'dark'));
    themeToggleBtn.addEventListener('click', () => {
      const root = document.documentElement;
      const next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      root.setAttribute('data-theme', next);
      themeToggleBtn.setAttribute('aria-pressed', String(next === 'dark'));
    });
  </script>
</body>
</html>
