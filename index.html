<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Envoyer un message— SIS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: #050505;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: 50%;
      left: 50%;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(102, 126, 234, 0.15), transparent);
      transform: translate(-50%, -50%);
      pointer-events: none;
      animation: pulse 4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.3; }
      50% { transform: translate(-50%, -50%) scale(1.1); opacity: 0.5; }
    }

    .container {
      width: 100%;
      max-width: 480px;
      position: relative;
      z-index: 1;
    }

    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    .sis-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, #667eea22, #764ba222);
      border: 1px solid #667eea44;
      padding: 8px 20px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 24px;
      color: #667eea;
    }

    .profile {
      display: flex;
      align-items: center;
      gap: 20px;
      background: linear-gradient(135deg, #0a0a0a, #1a1a1a);
      border: 1px solid #2a2a2a;
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 32px;
      position: relative;
      overflow: hidden;
    }

    .profile::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, #667eea, #764ba2, #667eea);
      background-size: 200% 100%;
      animation: shimmer 3s linear infinite;
    }

    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }

    .avatar {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 700;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }

    .avatar-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      position: absolute;
      top: 0;
      left: 0;
    }

    .profile-info h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .profile-info p {
      font-size: 14px;
      color: #888;
    }

    .anonymous-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #667eea22;
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      color: #667eea;
      margin-top: 8px;
    }

    .prompts {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }

    .prompt-card {
      background: #0f0f0f;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 16px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }

    .prompt-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(102, 126, 234, 0.1), transparent);
      transition: left 0.5s;
    }

    .prompt-card:hover::before {
      left: 100%;
    }

    .prompt-card:hover {
      border-color: #667eea;
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(102, 126, 234, 0.2);
    }

    .prompt-icon {
      font-size: 24px;
      margin-bottom: 8px;
      display: block;
    }

    .prompt-text {
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      line-height: 1.4;
    }

    .message-area {
      background: #0a0a0a;
      border: 2px solid #2a2a2a;
      border-radius: 20px;
      padding: 24px;
      margin-bottom: 20px;
      transition: border-color 0.3s;
    }

    .message-area:focus-within {
      border-color: #667eea;
      box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
    }

    .message-label {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #888;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    textarea {
      width: 100%;
      min-height: 140px;
      background: transparent;
      border: none;
      font-size: 16px;
      font-family: inherit;
      color: #fff;
      resize: vertical;
      line-height: 1.6;
    }

    textarea:focus {
      outline: none;
    }

    textarea::placeholder {
      color: #444;
    }

    .char-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 12px;
      font-size: 12px;
    }

    .char-count {
      color: #555;
    }

    .char-count.warning { color: #f59e0b; }
    .char-count.danger { color: #ef4444; }

    .emoji-hint {
      color: #667eea;
      font-weight: 600;
    }

    .send-btn {
      width: 100%;
      padding: 20px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border: none;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
      transition: all 0.3s;
      font-family: inherit;
      text-transform: uppercase;
      letter-spacing: 2px;
      position: relative;
      overflow: hidden;
    }

    .send-btn::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
      transform: translate(-50%, -50%);
      transition: width 0.6s, height 0.6s;
    }

    .send-btn:hover::before {
      width: 300px;
      height: 300px;
    }

    .send-btn:hover:not(:disabled) {
      transform: translateY(-3px);
      box-shadow: 0 12px 40px rgba(102, 126, 234, 0.4);
    }

    .send-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .send-btn span {
      position: relative;
      z-index: 1;
    }

    .success-modal {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: linear-gradient(135deg, #10b981, #059669);
      padding: 32px;
      border-radius: 24px;
      text-align: center;
      z-index: 100;
      box-shadow: 0 20px 60px rgba(16, 185, 129, 0.4);
      animation: popIn 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    }

    @keyframes popIn {
      0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0; }
      100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    }

    .success-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .success-text {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .success-sub {
      font-size: 14px;
      opacity: 0.9;
    }

    .footer-link {
      text-align: center;
      margin-top: 32px;
    }

    .footer-link a {
      color: #667eea;
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
      transition: color 0.2s;
    }

    .footer-link a:hover {
      color: #764ba2;
    }

    @media (max-width: 480px) {
      .prompts { grid-template-columns: 1fr; }
      .profile { flex-direction: column; text-align: center; }
      .avatar { width: 60px; height: 60px; font-size: 24px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="sis-badge">
        <span>🛡️</span>
        <span>SIS</span>
      </div>
    </div>

    <div class="profile">
      <div class="avatar" id="avatar">
        <span id="avatarText">U</span>
      </div>
      <div class="profile-info">
        <h1 id="username">@user</h1>
        <p>Envoie un message anonyme</p>
        <div class="anonymous-badge">
          <span>🔒</span>
          <span>100% Anonyme</span>
        </div>
      </div>
    </div>

    <div class="prompts">
      <div class="prompt-card" data-text="tbh, qu'est-ce que tu penses de moi ? 💭">
        <span class="prompt-icon">💭</span>
        <div class="prompt-text">tbh, ton avis sur moi ?</div>
      </div>
      <div class="prompt-card" data-text="un compliment sincère ? 🌟">
        <span class="prompt-icon">🌟</span>
        <div class="prompt-text">un compliment sincère ?</div>
      </div>
      <div class="prompt-card" data-text="avoue quelque chose 🤫">
        <span class="prompt-icon">🤫</span>
        <div class="prompt-text">avoue quelque chose</div>
      </div>
      <div class="prompt-card" data-text="crush ou pas crush ? 👀">
        <span class="prompt-icon">👀</span>
        <div class="prompt-text">crush ou pas crush ?</div>
      </div>
    </div>

    <div class="message-area">
      <div class="message-label">
        <span>✍️</span>
        <span>Ton message</span>
      </div>
      <textarea id="message" placeholder="écris ce que tu penses vraiment..." maxlength="5000"></textarea>
      <div class="char-info">
        <span class="emoji-hint">💡 utilise des emojis</span>
        <span class="char-count" id="count">0 / 5000</span>
      </div>
    </div>

    <button class="send-btn" id="sendBtn">
      <span>📤 Envoyer</span>
    </button>

    <div class="success-modal" id="success">
      <div class="success-icon">✓</div>
      <div class="success-text">Message envoyé !</div>
      <div class="success-sub">Il/elle va adorer 😊</div>
    </div>

    <div class="footer-link">
      <a href="https://sis-say-it-safely.vercel.app/">✨ Crée ton propre lien SIS</a>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";
    import { getDatabase, ref as dbRef, get } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBqk3L_qkolD41H3yvHEzz4O-Sr15I-Tko",
      authDomain: "gandxoanonymous.firebaseapp.com",
      projectId: "gandxoanonymous",
      storageBucket: "gandxoanonymous.appspot.com",
      messagingSenderId: "836606625364",
      appId: "1:836606625364:web:7150571998131c41c0cfc1",
      measurementId: "G-97TCHJ33KW",
      databaseURL: "https://gandxoanonymous-default-rtdb.firebaseio.com"
    };

    const CLOUDINARY_CLOUD_NAME = 'duddyzckz';
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const database = getDatabase(app);

    const params = new URLSearchParams(window.location.search);
    const pseudo = params.get("to");
    
    const message = document.getElementById("message");
    const count = document.getElementById("count");
    const sendBtn = document.getElementById("sendBtn");
    const success = document.getElementById("success");
    const username = document.getElementById("username");
    const avatar = document.getElementById("avatar");
    const avatarText = document.getElementById("avatarText");

    if (pseudo) {
      username.textContent = "@" + pseudo;
      avatarText.textContent = pseudo.charAt(0).toUpperCase();
      document.title = `Message pour @${pseudo} — SIS`;
      loadProfile(pseudo);
    }

    async function loadProfile(pseudo) {
      try {
        const usersRef = dbRef(database, 'users');
        const snapshot = await get(usersRef);
        
        if (snapshot.exists()) {
          const users = snapshot.val();
          for (const uid in users) {
            if (users[uid].pseudo === pseudo) {
              const user = users[uid];
              
              if (user.cloudinaryPublicId) {
                const url = `https://res.cloudinary.com/${CLOUDINARY_CLOUD_NAME}/image/upload/${user.cloudinaryPublicId}`;
                const img = document.createElement('img');
                img.src = url;
                img.className = 'avatar-img';
                avatar.appendChild(img);
              }
              break;
            }
          }
        }
      } catch (e) {
        console.error(e);
      }
    }

    message.addEventListener("input", () => {
      const len = message.value.length;
      count.textContent = `${len} / 5000`;
      count.classList.remove("warning", "danger");
      if (len > 4000) count.classList.add("warning");
      if (len > 4800) count.classList.add("danger");
    });

    document.querySelectorAll(".prompt-card").forEach(card => {
      card.addEventListener("click", () => {
        message.value = card.dataset.text;
        message.focus();
        message.dispatchEvent(new Event("input"));
      });
    });

    sendBtn.addEventListener("click", async () => {
      const msg = message.value.trim();
      
      if (!msg) {
        alert("✍️ Écris un message d'abord");
        return;
      }
      if (!pseudo) {
        alert("😔 Destinataire introuvable");
        return;
      }

      sendBtn.disabled = true;
      sendBtn.innerHTML = '<span>⏳ Envoi...</span>';

      try {
        await addDoc(collection(db, "messages"), {
          to: pseudo,
          message: msg,
          createdAt: serverTimestamp()
        });

        message.value = "";
        count.textContent = "0 / 5000";
        
        success.style.display = "block";
        setTimeout(() => {
          success.style.display = "none";
        }, 3000);
      } catch (e) {
        alert("❌ Erreur : " + e.message);
      } finally {
        sendBtn.disabled = false;
        sendBtn.innerHTML = '<span>📤 Envoyer</span>';
      }
    });
  </script>
</body>
</html>
