  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #000;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 460px;
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .sis-logo {
      text-align: center;
      margin-bottom: 32px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 3px;
      color: #667eea;
      text-transform: uppercase;
    }

    .profile {
      display: flex;
      align-items: center;
      gap: 16px;
      background: #111;
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 24px;
      transition: transform 0.2s;
    }

    .profile:hover {
      transform: translateY(-2px);
    }

    .avatar {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 700;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }

    .avatar-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      position: absolute;
      top: 0;
      left: 0;
    }

    .profile-info h1 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .profile-info p {
      font-size: 13px;
      color: #888;
    }

    .prompts {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }

    .prompt {
      background: #111;
      border: 1px solid #222;
      border-radius: 14px;
      padding: 14px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      text-align: center;
    }

    .prompt:hover {
      background: #667eea;
      border-color: #667eea;
      transform: scale(1.02);
    }

    .prompt:active {
      transform: scale(0.98);
    }

    .message-box {
      background: #111;
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 16px;
      transition: all 0.2s;
    }

    .message-box:focus-within {
      background: #161616;
    }

    textarea {
      width: 100%;
      min-height: 130px;
      background: transparent;
      border: none;
      font-size: 15px;
      font-family: inherit;
      color: #fff;
      resize: none;
      line-height: 1.5;
    }

    textarea:focus {
      outline: none;
    }

    textarea::placeholder {
      color: #555;
    }

    .char-count {
      text-align: right;
      font-size: 12px;
      color: #555;
      margin-top: 8px;
    }

    .char-count.warning { color: #f59e0b; }
    .char-count.danger { color: #ef4444; }

    .btn-send {
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border: none;
      border-radius: 16px;
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      font-family: inherit;
    }

    .btn-send:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(102, 126, 234, 0.4);
    }

    .btn-send:active:not(:disabled) {
      transform: translateY(0);
    }

    .btn-send:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .success {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      background: linear-gradient(135deg, #10b981, #059669);
      padding: 32px 48px;
      border-radius: 20px;
      text-align: center;
      font-weight: 700;
      font-size: 18px;
      box-shadow: 0 20px 60px rgba(16, 185, 129, 0.4);
      transition: transform 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      z-index: 100;
    }

    .success.show {
      transform: translate(-50%, -50%) scale(1);
    }

    .footer {
      text-align: center;
      margin-top: 24px;
      font-size: 14px;
    }

    .footer a {
      color: #667eea;
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s;
    }

    .footer a:hover {
      color: #764ba2;
    }

    @media (max-width: 480px) {
      .prompts { grid-template-columns: 1fr; }
      .profile { padding: 16px; }
      .avatar { width: 56px; height: 56px; font-size: 22px; }

<body>
  <div class="container">
    <header>
      <h2 class="sis-logo">🛡️ SIS</h2>
    </header>

    <main>
      <article class="profile">
        <div class="avatar" id="avatar">
          <span id="avatarText">U</span>
        </div>
        <div class="profile-info">
          <h1 id="username">@user</h1>
          <p>Message anonyme • 100% confidentiel</p>
        </div>
      </article>

      <section class="prompts">
        <button class="prompt" data-text="tbh ton avis sur moi ? 💭" aria-label="Suggestion: tbh ton avis">💭ton avis ?</button>
        <button class="prompt" data-text="un compliment ? 🌟" aria-label="Suggestion: compliment">🌟 compliment</button>
        <button class="prompt" data-text="avoue quelque chose 🤫" aria-label="Suggestion: avoue un truc">🤫 avoue un truc</button>
        <button class="prompt" data-text="crush ou pas ? 👀" aria-label="Suggestion: crush">👀 crush ?</button>
      </section>

      <section class="message-box">
        <label for="message" class="sr-only">Votre message anonyme</label>
        <textarea id="message" placeholder="dis ce que tu penses vraiment..." maxlength="5000" aria-label="Zone de texte pour votre message anonyme"></textarea>
        <div class="char-count" id="count" aria-live="polite">0 / 5000</div>
      </section>

      <button class="btn-send" id="sendBtn" aria-label="Envoyer le message anonyme">Envoyer </button>
    </main>

    <div class="success" id="success" role="alert" aria-live="assertive">
      ✓ Message envoyé !
    </div>

    <footer class="footer">
      <a href="https://sis-say-it-safely.vercel.app/" rel="noopener">crée ton lien sis</a>
    </footer>
  </div>

  <!-- Screen reader only class -->
  <style>
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border-width: 0;
    }
  </style>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";
    import { getDatabase, ref as dbRef, get } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBqk3L_qkolD41H3yvHEzz4O-Sr15I-Tko",
      authDomain: "gandxoanonymous.firebaseapp.com",
      projectId: "gandxoanonymous",
      storageBucket: "gandxoanonymous.appspot.com",
      messagingSenderId: "836606625364",
      appId: "1:836606625364:web:7150571998131c41c0cfc1",
      measurementId: "G-97TCHJ33KW",
      databaseURL: "https://gandxoanonymous-default-rtdb.firebaseio.com"
    };

    const CLOUDINARY_CLOUD_NAME = 'duddyzckz';
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const database = getDatabase(app);

    const params = new URLSearchParams(window.location.search);
    const pseudo = params.get("to");
    
    const message = document.getElementById("message");
    const count = document.getElementById("count");
    const sendBtn = document.getElementById("sendBtn");
    const success = document.getElementById("success");
    const username = document.getElementById("username");
    const avatar = document.getElementById("avatar");
    const avatarText = document.getElementById("avatarText");

    if (pseudo) {
      const cleanPseudo = pseudo.replace(/[^a-zA-Z0-9_-]/g, '');
      username.textContent = "@" + cleanPseudo;
      avatarText.textContent = cleanPseudo.charAt(0).toUpperCase();
      
      // Update meta tags dynamically
      document.title = `Message anonyme pour @${cleanPseudo} — SIS`;
      document.querySelector('meta[name="description"]').setAttribute('content', `Envoie un message 100% anonyme à @${cleanPseudo} sur SIS. Dis ce que tu penses vraiment sans révéler ton identité.`);
      document.querySelector('meta[property="og:title"]').setAttribute('content', `Message anonyme pour @${cleanPseudo}`);
      document.querySelector('meta[property="og:description"]').setAttribute('content', `Envoie un message 100% anonyme à @${cleanPseudo}. Plateforme sécurisée SIS.`);
      
      loadProfile(cleanPseudo);
    }

    async function loadProfile(pseudo) {
      try {
        const usersRef = dbRef(database, 'users');
        const snapshot = await get(usersRef);
        
        if (snapshot.exists()) {
          const users = snapshot.val();
          for (const uid in users) {
            if (users[uid].pseudo === pseudo) {
              const user = users[uid];
              
              if (user.cloudinaryPublicId) {
                const url = `https://res.cloudinary.com/${CLOUDINARY_CLOUD_NAME}/image/upload/${user.cloudinaryPublicId}`;
                const img = document.createElement('img');
                img.src = url;
                img.className = 'avatar-img';
                img.alt = `Photo de profil de ${pseudo}`;
                avatar.appendChild(img);
              }
              break;
            }
          }
        }
      } catch (e) {
        console.error(e);
      }
    }

    message.addEventListener("input", () => {
      const len = message.value.length;
      count.textContent = `${len} / 5000`;
      count.classList.remove("warning", "danger");
      if (len > 4000) count.classList.add("warning");
      if (len > 4800) count.classList.add("danger");
    });

    document.querySelectorAll(".prompt").forEach(p => {
      p.addEventListener("click", () => {
        message.value = p.dataset.text;
        message.focus();
        message.dispatchEvent(new Event("input"));
      });
    });

    sendBtn.addEventListener("click", async () => {
      const msg = message.value.trim();
      
      if (!msg) {
        message.focus();
        return;
      }
      if (!pseudo) {
        alert("destinataire introuvable");
        return;
      }

      sendBtn.disabled = true;
      sendBtn.textContent = "envoi...";

      try {
        await addDoc(collection(db, "messages"), {
          to: pseudo.replace(/[^a-zA-Z0-9_-]/g, ''),
          message: msg,
          createdAt: serverTimestamp()
        });

        message.value = "";
        count.textContent = "0 / 5000";
        
        success.classList.add("show");
        setTimeout(() => success.classList.remove("show"), 2000);
      } catch (e) {
        alert("erreur : " + e.message);
      } finally {
        sendBtn.disabled = false;
        sendBtn.textContent = "Envoyer";
      }
    });
  </script>
