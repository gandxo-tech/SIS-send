<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>SIS – Mes Messages Anonymes</title>
  <meta name="description" content="Consultez vos messages anonymes sur SIS de manière simple et sécurisée.">
  <meta name="keywords" content="messages anonymes, SIS, NGL like, chat privé">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Anton&family=Hanken+Grotesk:wght@500;700&display=swap');

    :root {
      --bg: #f0f4ff;
      --card-bg: #ffffff;
      --text: #333333;
      --text-secondary: #666666;
      --accent: #00d4ff;
      --accent-secondary: #667eea;
      --gradient: linear-gradient(135deg, var(--accent) 0%, var(--accent-secondary) 100%);
      --border: #e0e6ff;
      --shadow: 0 4px 12px rgba(0, 212, 255, 0.1);
      --shadow-hover: 0 8px 24px rgba(0, 212, 255, 0.2);
      --radius: 20px;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      --header-height: 36px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, var(--bg) 0%, #e6f3ff 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      transition: var(--transition);
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 20% 80%, rgba(0, 212, 255, 0.1) 0%, transparent 50%),
                  radial-gradient(circle at 80% 20%, rgba(102, 126, 234, 0.1) 0%, transparent 50%);
      pointer-events: none;
      z-index: -1;
    }

    .auth-screen {
      max-width: 400px;
      width: 100%;
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 40px;
      box-shadow: var(--shadow-hover);
      text-align: center;
      animation: fadeInUp 0.6s ease-out;
    }

    .auth-screen.hidden {
      display: none;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .auth-logo {
      font-size: 64px;
      margin-bottom: 20px;
    }

    .auth-title {
      font-size: 28px;
      font-weight: 700;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 12px;
    }

    .auth-subtitle {
      color: var(--text-secondary);
      margin-bottom: 32px;
      line-height: 1.6;
    }

    .input-field {
      width: 100%;
      padding: 14px 18px;
      background: var(--bg);
      border: 2px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-size: 15px;
      font-family: inherit;
      transition: var(--transition);
      margin-bottom: 16px;
    }

    .input-field:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1);
    }

    .input-field::placeholder {
      color: var(--text-secondary);
    }

    .container {
      max-width: 500px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 24px;
      position: relative;
      z-index: 1;
    }

    .container.hidden {
      display: none;
    }

    .header-section {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--card-bg);
      padding: 20px;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .user-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--accent);
    }

    .user-name {
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
    }

    h1 {
      font-size: 32px;
      font-weight: 700;
      text-align: center;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
      animation: glow 2s ease-in-out infinite alternate;
    }

    @keyframes glow {
      from { filter: drop-shadow(0 0 5px rgba(0, 212, 255, 0.3)); }
      to { filter: drop-shadow(0 0 20px rgba(0, 212, 255, 0.6)); }
    }

    .subtitle {
      text-align: center;
      color: var(--text-secondary);
      font-size: 16px;
      font-weight: 400;
      line-height: 1.5;
    }

    .btn {
      padding: 16px 24px;
      border: none;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      position: relative;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: left 0.5s;
    }

    .btn:hover:not(:disabled)::before {
      left: 100%;
    }

    .btn-primary {
      background: var(--gradient);
      color: white;
      box-shadow: var(--shadow);
      width: 100%;
    }

    .btn-primary:hover:not(:disabled) {
      transform: translateY(-2px) scale(1.02);
      box-shadow: var(--shadow-hover);
    }

    .btn-secondary {
      background: var(--card-bg);
      color: var(--accent);
      border: 2px solid var(--accent);
      font-size: 14px;
      padding: 10px 16px;
    }

    .btn-secondary:hover {
      background: var(--accent);
      color: white;
      transform: scale(1.05);
    }

    .btn-logout {
      background: transparent;
      color: var(--text-secondary);
      border: 2px solid var(--border);
      padding: 10px 16px;
      font-size: 14px;
    }

    .btn-logout:hover {
      background: #ff4444;
      color: white;
      border-color: #ff4444;
    }

    .loading {
      display: none;
      text-align: center;
      padding: 20px;
      color: var(--text-secondary);
    }

    .loading.active {
      display: block;
    }

    .spinner {
      border: 3px solid var(--border);
      border-top: 3px solid var(--accent);
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(40px) scale(0.96);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .messages {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 0;
      box-shadow: var(--shadow);
      transition: var(--transition);
      position: relative;
      overflow: hidden;
      border: 1px solid var(--border);
      opacity: 0;
      transform: translateY(20px);
      animation: fadeInUp 0.6s ease-out forwards;
    }

    .message:nth-child(2) { animation-delay: 0.1s; }
    .message:nth-child(3) { animation-delay: 0.2s; }
    .message:nth-child(4) { animation-delay: 0.3s; }
    .message:nth-child(5) { animation-delay: 0.4s; }
    .message:nth-child(6) { animation-delay: 0.5s; }
    .message:nth-child(n+7) { animation-delay: 0.6s; }

    .message:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
    }

    .message-header {
      height: var(--header-height);
      background: var(--gradient);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .message-header::after {
      content: 'SIS';
      font-size: 20px;
      font-weight: 700;
      color: white;
      text-shadow: 0 1px 2px rgba(0,0,0,0.3);
      z-index: 1;
      letter-spacing: 1px;
    }

    .message:nth-child(2) .message-header { background: linear-gradient(135deg, #00bfff 0%, #1e90ff 100%); }
    .message:nth-child(3) .message-header { background: linear-gradient(135deg, #87ceeb 0%, #4682b4 100%); }
    .message:nth-child(4) .message-header { background: linear-gradient(135deg, #add8e6 0%, #4169e1 100%); }
    .message:nth-child(5) .message-header { background: linear-gradient(135deg, #b0e0e6 0%, #191970 100%); }
    .message:nth-child(6) .message-header { background: linear-gradient(135deg, #e6f3ff 0%, #000080 100%); }

    .message-content {
      padding: 20px;
    }

    .message-text {
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 12px;
      color: var(--text);
      word-break: break-word;
      white-space: pre-wrap;
    }

    .message-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
      color: var(--text-secondary);
      padding: 0 20px 20px;
      gap: 12px;
      flex-wrap: wrap;
    }

    .message-actions {
      display: flex;
      gap: 8px;
    }

    .empty {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-secondary);
      font-size: 18px;
      background: rgba(0, 212, 255, 0.05);
      border-radius: var(--radius);
      border: 1px dashed var(--accent);
      line-height: 1.6;
    }

    .share-link {
      background: var(--card-bg);
      border: 2px dashed var(--accent);
      border-radius: var(--radius);
      padding: 20px;
      text-align: center;
      animation: fadeInUp 0.6s ease-out;
      box-shadow: var(--shadow);
    }

    .share-link p {
      margin-bottom: 12px;
      color: var(--text);
      font-weight: 500;
    }

    .share-link input {
      width: 100%;
      background: var(--bg);
      border: 2px solid var(--border);
      color: var(--text);
      font-size: 14px;
      text-align: center;
      margin-bottom: 12px;
      padding: 12px;
      border-radius: 12px;
      font-family: 'Inter', monospace;
      transition: var(--transition);
    }

    .share-link input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .share-buttons {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .warning-message {
      background: #fff9e6;
      border: 2px solid #ffa500;
      border-radius: var(--radius);
      padding: 20px;
      color: #cc8800;
      text-align: center;
      line-height: 1.6;
      margin-bottom: 16px;
    }

    .warning-message strong {
      display: block;
      margin-bottom: 12px;
      font-size: 18px;
      color: #ff8800;
    }

    .warning-message a {
      color: var(--accent);
      font-weight: 600;
      text-decoration: none;
      padding: 8px 16px;
      background: white;
      border-radius: 8px;
      display: inline-block;
      margin-top: 12px;
      transition: var(--transition);
    }

    .warning-message a:hover {
      background: var(--accent);
      color: white;
      transform: scale(1.05);
    }

    .error-message {
      background: #fff3f3;
      border: 2px solid #ff4444;
      border-radius: var(--radius);
      padding: 20px;
      color: #cc0000;
      text-align: center;
      line-height: 1.6;
    }

    .error-message strong {
      display: block;
      margin-bottom: 8px;
      font-size: 18px;
    }

    @media (max-width: 480px) {
      body { padding: 20px 16px; }
      h1 { font-size: 28px; }
      .subtitle { font-size: 15px; }
      .message-header { --header-height: 32px; }
      .message-header::after { font-size: 12px; }
      .message-content { padding: 16px; }
      .message-meta { 
        padding: 0 16px 16px;
        flex-direction: column;
        align-items: stretch;
      }
      .message-actions {
        width: 100%;
        flex-direction: column;
      }
      .message-actions .btn-secondary {
        width: 100%;
      }
      .container { gap: 20px; }
      .share-link { padding: 16px; }
      .share-link input { font-size: 13px; }
      .auth-screen { padding: 30px 20px; }
    }

    @media (max-width: 320px) {
      .message-text { font-size: 15px; }
      h1 { font-size: 24px; }
    }
  </style>
</head>
<body>
  <div class="auth-screen" id="authScreen">
    <div class="auth-logo">🔐</div>
    <h2 class="auth-title">SIS Messages</h2>
    <p class="auth-subtitle">Connecte-toi pour voir tes messages anonymes</p>

    <input type="email" class="input-field" id="loginEmail" placeholder="Email" required autocomplete="email">
    <input type="password" class="input-field" id="loginPassword" placeholder="Mot de passe" required autocomplete="current-password">

    <button class="btn btn-primary" id="loginBtn">🔓 Se connecter</button>

    <p style="margin-top: 20px; color: var(--text-secondary); font-size: 14px;">
      Pas de compte ? <a href="index.html" style="color: var(--accent); font-weight: 600;">Inscris-toi ici</a>
    </p>
  </div>

  <div class="container hidden" id="mainContainer">
    <div class="header-section">
      <div class="user-info">
        <img class="user-avatar" id="userAvatar" alt="Avatar">
        <div>
          <div class="user-name" id="userName">Chargement...</div>
        </div>
      </div>
      <button class="btn btn-logout" id="logoutBtn">🚪 Déconnexion</button>
    </div>

    <h1>📬 Mes Messages</h1>
    <p class="subtitle">Tes messages anonymes sont chargés automatiquement</p>

    <button class="btn btn-primary" id="load">Recharger les messages ✨</button>

    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p>Chargement des secrets...</p>
    </div>

    <div class="messages" id="messages"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, query, where, getDocs, orderBy, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBqk3L_qkolD41H3yvHEzz4O-Sr15I-Tko",
      authDomain: "gandxoanonymous.firebaseapp.com",
      projectId: "gandxoanonymous",
      storageBucket: "gandxoanonymous.appspot.com",
      messagingSenderId: "836606625364",
      appId: "1:836606625364:web:7150571998131c41c0cfc1",
      measurementId: "G-97TCHJ33KW",
      databaseURL: "https://gandxoanonymous-default-rtdb.firebaseio.com"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const $ = (selector) => document.getElementById(selector);
    const authScreen = $('authScreen');
    const mainContainer = $('mainContainer');
    const loginEmail = $('loginEmail');
    const loginPassword = $('loginPassword');
    const loginBtn = $('loginBtn');
    const logoutBtn = $('logoutBtn');
    const loadBtn = $('load');
    const loading = $('loading');
    const messages = $('messages');
    const userAvatar = $('userAvatar');
    const userName = $('userName');

    let currentUser = null;
    let userPseudo = '';

    loginPassword.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        loginBtn.click();
      }
    });

    loginEmail.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        loginPassword.focus();
      }
    });

    loginBtn.addEventListener('click', async () => {
      const email = loginEmail.value.trim();
      const password = loginPassword.value;

      if (!email || !password) {
        alert('⚠️ Entre ton email et mot de passe !');
        return;
      }

      loginBtn.disabled = true;
      loginBtn.textContent = '⏳ Connexion...';

      try {
        const userCredential = await signInWithEmailAndPassword(auth, email, password);
        console.log('✅ Connexion réussie:', userCredential.user.email);
      } catch (error) {
        console.error("❌ Erreur de connexion:", error.code, error.message);
        let errorMsg = "Email ou mot de passe incorrect";

        if (error.code === 'auth/user-not-found') {
          errorMsg = "Aucun compte trouvé avec cet email";
        } else if (error.code === 'auth/wrong-password') {
          errorMsg = "Mot de passe incorrect";
        } else if (error.code === 'auth/invalid-credential') {
          errorMsg = "Email ou mot de passe incorrect";
        } else if (error.code === 'auth/too-many-requests') {
          errorMsg = "Trop de tentatives. Réessaye plus tard.";
        } else if (error.code === 'auth/invalid-email') {
          errorMsg = "Format d'email invalide";
        } else if (error.code === 'auth/network-request-failed') {
          errorMsg = "Erreur réseau. Vérifie ta connexion.";
        }

        alert("❌ " + errorMsg);
        loginBtn.disabled = false;
        loginBtn.textContent = '🔓 Se connecter';
      }
    });

    logoutBtn.addEventListener('click', async () => {
      try {
        await signOut(auth);
        window.location.reload();
      } catch (error) {
        console.error("Erreur de déconnexion:", error);
      }
    });

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        currentUser = user;
        console.log('✅ Utilisateur connecté:', user.email);

        try {
          const userSnap = await getDoc(doc(db, 'users', user.uid));

          if (userSnap.exists()) {
            const userData = userSnap.data();
            userPseudo = userData.pseudo || user.email.split('@')[0];
            console.log('✅ Pseudo trouvé:', userPseudo);
          } else {
            userPseudo = user.displayName || user.email.split('@')[0];
            console.log('⚠️ Pas de profil Firestore, utilisation de:', userPseudo);
          }
        } catch (error) {
          console.error("❌ Erreur récupération pseudo:", error);
          userPseudo = user.displayName || user.email.split('@')[0];
        }

        authScreen.classList.add('hidden');
        mainContainer.classList.remove('hidden');

        const photoURL = user.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(userPseudo)}&background=0ea5e9&color=ffffff&size=200`;
        userAvatar.src = photoURL;
        userName.textContent = `@${userPseudo}`;

        setTimeout(() => loadMessages(), 500);
      } else {
        currentUser = null;
        authScreen.classList.remove('hidden');
        mainContainer.classList.add('hidden');
        console.log('ℹ️ Aucun utilisateur connecté');
      }
    });

    const setState = (isLoading) => {
      loadBtn.disabled = isLoading;
      loadBtn.textContent = isLoading ? '⏳ Chargement...' : 'Recharger les messages ✨';
      loading.classList.toggle('active', isLoading);
    };

    const showError = (title, message) => {
      messages.innerHTML = `
        <div class="error-message">
          <strong>${title}</strong>
          <p>${message}</p>
        </div>
      `;
    };

    const showIndexWarning = (indexLink) => {
      const warningDiv = document.createElement('div');
      warningDiv.className = 'warning-message';
      warningDiv.innerHTML = `
        <strong>⚠️ Index manquant</strong>
        <p>Firebase a besoin d'un index pour charger tes messages rapidement.</p>
        <p>Clique sur le bouton ci-dessous, ça va ouvrir Firebase et créer l'index automatiquement !</p>
        <a href="${indexLink}" target="_blank">🔧 Créer l'index automatiquement</a>
        <p style="margin-top: 12px; font-size: 13px;">Après avoir cliqué, attends 1-2 minutes puis recharge cette page.</p>
      `;
      messages.appendChild(warningDiv);
    };

    const escapeHtml = (text) => {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    };

    const formatDate = (timestamp) => {
      if (!timestamp) return 'Date inconnue';

      let date;
      if (timestamp.toDate) {
        date = timestamp.toDate();
      } else if (timestamp instanceof Date) {
        date = timestamp;
      } else if (typeof timestamp === 'number') {
        date = new Date(timestamp);
      } else if (typeof timestamp === 'string') {
        date = new Date(timestamp);
      } else {
        return 'Date inconnue';
      }

      return date.toLocaleString('fr-FR', { 
        dateStyle: 'short', 
        timeStyle: 'short' 
      });
    };

    // ===== Génération des cartes de partage (canvas natif, format story 9:16) =====
    // Design aligné sur la maquette Stitch : dégradé vertical, bulle blanche
    // avec message en majuscules (police Anton), CTA en pastille sombre,
    // emoji flottants décoratifs. Zones de sécurité Instagram/TikTok respectées
    // (~250px libres en haut, ~300px en bas).
    const CARD_W = 1080;
    const CARD_H = 1920;

    const CARD_ICONS = {
      download: '<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12"/><path d="M7 10l5 5 5-5"/><path d="M4 19h16"/></svg>',
      share: '<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.6" y1="10.5" x2="15.4" y2="6.5"/><line x1="8.6" y1="13.5" x2="15.4" y2="17.5"/></svg>',
      close: '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>'
    };

    const CARD_STYLES = [
      { key: 'classique', name: 'Classique', emoji: '💌', from: '#00d4ff', to: '#1f3ba6' },
      { key: 'azur',      name: 'Azur',      emoji: '💙', from: '#00bfff', to: '#1e90ff' },
      { key: 'ciel',      name: 'Ciel',      emoji: '☁️', from: '#87ceeb', to: '#4682b4' },
      { key: 'royal',     name: 'Royal',     emoji: '👑', from: '#add8e6', to: '#4169e1' },
      { key: 'minuit',    name: 'Minuit',    emoji: '🌙', from: '#b0e0e6', to: '#191970' }
    ];

    const wrapCanvasText = (ctx, text, maxWidth) => {
      const lines = [];
      String(text).split('\n').forEach((paragraph) => {
        const words = paragraph.split(' ');
        let line = '';
        words.forEach((word) => {
          const test = line ? `${line} ${word}` : word;
          if (line && ctx.measureText(test).width > maxWidth) {
            lines.push(line);
            line = word;
          } else {
            line = test;
          }
        });
        lines.push(line);
      });
      return lines;
    };

    const fitMessageFont = (ctx, text, maxWidth, maxHeight, opts = {}) => {
      const {
        fontFamily = 'Inter, sans-serif',
        fontWeight = 700,
        lineHeightRatio = 1.35,
        maxFont = 64,
        minFont = 30
      } = opts;

      for (let fontSize = maxFont; fontSize >= minFont; fontSize -= 2) {
        ctx.font = `${fontWeight} ${fontSize}px ${fontFamily}`;
        const lines = wrapCanvasText(ctx, text, maxWidth);
        const lineHeight = fontSize * lineHeightRatio;
        if (lines.length * lineHeight <= maxHeight) {
          return { fontSize, lines, lineHeight };
        }
      }
      // Message trop long même en taille mini : troncature propre avec "…"
      ctx.font = `${fontWeight} ${minFont}px ${fontFamily}`;
      const lineHeight = minFont * lineHeightRatio;
      const maxLines = Math.max(1, Math.floor(maxHeight / lineHeight));
      const lines = wrapCanvasText(ctx, text, maxWidth).slice(0, maxLines);
      let last = lines[maxLines - 1] || '';
      while (last.length > 1 && ctx.measureText(`${last}…`).width > maxWidth) {
        last = last.slice(0, -1);
      }
      lines[maxLines - 1] = `${last}…`;
      return { fontSize: minFont, lines, lineHeight };
    };

    const roundRect = (ctx, x, y, w, h, r) => {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
    };

    // Les polices web ne sont "fetchées" qu'une fois réellement utilisées :
    // on force le chargement avant de dessiner, sinon le canvas dessine
    // avec la police de repli sans jamais se corriger.
    const ensureCardFontsLoaded = async () => {
      const specs = ['400 100px Anton', '700 34px "Hanken Grotesk"', '600 30px "Hanken Grotesk"'];
      try {
        await Promise.all(specs.map((spec) => document.fonts.load(spec)));
      } catch (e) {
        // best-effort : on continue avec la police de repli si le chargement échoue
      }
      if (document.fonts && document.fonts.ready) {
        await document.fonts.ready;
      }
    };

    const generateCardBlob = async (message, dateStr, style) => {
      await ensureCardFontsLoaded();

      const canvas = document.createElement('canvas');
      canvas.width = CARD_W;
      canvas.height = CARD_H;
      const ctx = canvas.getContext('2d');

      // Fond dégradé vertical (mêmes couleurs que les headers de messages dans l'app)
      const bgGradient = ctx.createLinearGradient(0, 0, 0, CARD_H);
      bgGradient.addColorStop(0, style.from);
      bgGradient.addColorStop(1, style.to);
      ctx.fillStyle = bgGradient;
      ctx.fillRect(0, 0, CARD_W, CARD_H);

      // Wordmark "SIS"
      ctx.save();
      ctx.textAlign = 'center';
      ctx.textBaseline = 'alphabetic';
      ctx.fillStyle = '#0a2233';
      ctx.font = '400 100px Anton, sans-serif';
      ctx.fillText('SIS', CARD_W / 2, 380);
      ctx.restore();

      // Bulle blanche avec le message (majuscules, taille auto-ajustée) + date en bas
      const panelX = 90;
      const panelW = CARD_W - 180;
      const innerPadX = 80;
      const innerPadY = 70;
      const dateZoneH = 90;
      const maxTextWidth = panelW - innerPadX * 2;

      const zoneTop = 460;
      const zoneBottom = 1360;
      const zoneHeight = zoneBottom - zoneTop;
      const maxTextHeight = zoneHeight - innerPadY - dateZoneH;

      const upperMessage = (message || '').toUpperCase();
      const { fontSize, lines, lineHeight } = fitMessageFont(ctx, upperMessage, maxTextWidth, maxTextHeight, {
        fontFamily: 'Anton, sans-serif',
        fontWeight: 400,
        lineHeightRatio: 1.08,
        maxFont: 78,
        minFont: 32
      });

      const panelH = lines.length * lineHeight + innerPadY + dateZoneH;
      const panelY = zoneTop + (zoneHeight - panelH) / 2;

      ctx.save();
      ctx.shadowColor = 'rgba(8, 16, 24, 0.22)';
      ctx.shadowBlur = 44;
      ctx.shadowOffsetY = 16;
      ctx.fillStyle = '#ffffff';
      roundRect(ctx, panelX, panelY, panelW, panelH, 56);
      ctx.fill();
      ctx.restore();

      ctx.save();
      ctx.textAlign = 'center';
      ctx.textBaseline = 'alphabetic';
      ctx.fillStyle = '#14141b';
      ctx.font = `400 ${fontSize}px Anton, sans-serif`;
      let ty = panelY + innerPadY + fontSize * 0.8;
      lines.forEach((line) => {
        ctx.fillText(line, CARD_W / 2, ty);
        ty += lineHeight;
      });
      ctx.restore();

      if (dateStr) {
        ctx.save();
        ctx.textAlign = 'center';
        ctx.textBaseline = 'alphabetic';
        ctx.font = '600 28px "Hanken Grotesk", sans-serif';
        ctx.fillStyle = 'rgba(20, 20, 27, 0.45)';
        ctx.fillText(dateStr, CARD_W / 2, panelY + panelH - 36);
        ctx.restore();
      }

      // CTA en pastille sombre
      const ctaLabel = 'ENVOIE-MOI UN MESSAGE ANONYME 👀';
      const pillH = 118;
      const pillCenterY = 1460;

      ctx.save();
      ctx.font = '700 34px "Hanken Grotesk", sans-serif';
      ctx.letterSpacing = '3px';
      const ctaTextWidth = ctx.measureText(ctaLabel).width;
      const pillPadX = 56;
      const pillW = Math.min(CARD_W - 140, ctaTextWidth + pillPadX * 2);
      const pillX = (CARD_W - pillW) / 2;
      const pillY = pillCenterY - pillH / 2;

      roundRect(ctx, pillX, pillY, pillW, pillH, pillH / 2);
      ctx.fillStyle = '#15151a';
      ctx.fill();
      ctx.lineWidth = 3;
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.16)';
      ctx.stroke();

      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = '#f2f1f3';
      ctx.fillText(ctaLabel, CARD_W / 2, pillCenterY);
      ctx.restore();

      // URL du site
      ctx.save();
      ctx.textAlign = 'center';
      ctx.textBaseline = 'alphabetic';
      ctx.font = '600 30px "Hanken Grotesk", sans-serif';
      ctx.fillStyle = 'rgba(255, 255, 255, 0.72)';
      ctx.fillText(window.location.host, CARD_W / 2, pillCenterY + pillH / 2 + 55);
      ctx.restore();

      // Emoji flottants décoratifs (dessinés en dernier, par-dessus, comme des
      // stickers posés sur la carte — pas d'image externe : évite de "tainter"
      // le canvas et casser le téléchargement)
      const decos = [
        { char: '🤫', cx: 60, cy: 250, size: 230, rotate: -12, alpha: 0.85 },
        { char: '👀', cx: CARD_W - 40, cy: 860, size: 260, rotate: 12, alpha: 0.8 },
        { char: '💌', cx: 50, cy: CARD_H - 560, size: 210, rotate: 8, alpha: 0.85 },
        { char: '✨', cx: CARD_W - 45, cy: CARD_H - 300, size: 220, rotate: -10, alpha: 0.8 }
      ];
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      decos.forEach((d) => {
        ctx.save();
        ctx.globalAlpha = d.alpha;
        ctx.translate(d.cx, d.cy);
        ctx.rotate((d.rotate * Math.PI) / 180);
        ctx.font = `${d.size}px sans-serif`;
        ctx.fillText(d.char, 0, 0);
        ctx.restore();
      });

      return new Promise((resolve) => canvas.toBlob(resolve, 'image/png'));
    };
    // ===== Fin génération des cartes =====


    const openCardModal = (data, docId) => {
      const sendMessageUrl = `https://send-anonymous-messages.vercel.app/?to=${encodeURIComponent(userPseudo)}`;

      const modal = document.createElement('div');
      modal.style.cssText = `
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.85);
        backdrop-filter: blur(10px);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 10000;
        padding: 20px;
        animation: fadeIn 0.3s ease;
      `;

      const modalContent = document.createElement('div');
      modalContent.style.cssText = `
        background: var(--card-bg);
        border-radius: 24px;
        padding: 35px;
        max-width: 480px;
        width: 100%;
        max-height: 90vh;
        overflow-y: auto;
        box-shadow: 0 25px 80px rgba(0, 212, 255, 0.3);
        animation: slideUp 0.4s ease;
      `;

      modalContent.innerHTML = `
        <h3 style="text-align: center; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; font-size: 26px; font-weight: 700;">
          📸 Choisis ta carte
        </h3>
        <p style="text-align: center; color: var(--text-secondary); margin-bottom: 30px; font-size: 15px;">
          Format story, prête à poster sur Insta ou TikTok
        </p>
        <div id="cardStyleSelection"></div>
        <button id="closeModal" style="
          width: 100%;
          margin-top: 25px;
          padding: 14px;
          background: var(--msg-item-bg, #f3f3f7);
          color: var(--text);
          border: 1px solid var(--border);
          border-radius: 16px;
          font-size: 15px;
          cursor: pointer;
          font-weight: 600;
          display: inline-flex;
          align-items: center;
          justify-content: center;
          gap: 8px;
          transition: all 0.3s;
        ">${CARD_ICONS.close} Fermer</button>
      `;

      modal.appendChild(modalContent);
      document.body.appendChild(modal);

      const selection = modalContent.querySelector('#cardStyleSelection');

      const handleCardAction = async (kind, style, rowEl, iconBtns) => {
        iconBtns.forEach((b) => (b.disabled = true));
        rowEl.style.opacity = '0.55';

        try {
          const blob = await generateCardBlob(data.message || '', formatDate(data.createdAt), style);

          if (kind === 'share') {
            const file = new File([blob], `SIS-message-${docId}.png`, { type: 'image/png' });
            if (navigator.canShare && navigator.canShare({ files: [file] })) {
              await navigator.share({
                files: [file],
                title: 'Message anonyme SIS',
                text: 'Réponds-moi anonymement 👀',
                url: sendMessageUrl
              });
              document.body.removeChild(modal);
              return;
            }
            // Pas de Web Share API (desktop notamment) : on retombe sur le téléchargement
          }

          const url = URL.createObjectURL(blob);
          const link = document.createElement('a');
          link.download = `SIS-message-${docId}.png`;
          link.href = url;
          link.click();
          URL.revokeObjectURL(url);
          document.body.removeChild(modal);
        } catch (err) {
          iconBtns.forEach((b) => (b.disabled = false));
          rowEl.style.opacity = '1';
          if (err.name !== 'AbortError') {
            console.error('Erreur carte:', err);
            alert('❌ Erreur lors de la génération de la carte');
          }
        }
      };

      CARD_STYLES.forEach((style) => {
        const row = document.createElement('div');
        row.style.cssText = `
          width: 100%;
          margin-bottom: 14px;
          padding: 14px;
          background: var(--card-bg);
          border: 2px solid var(--border);
          border-radius: 16px;
          display: flex;
          align-items: center;
          gap: 14px;
          transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        `;

        row.innerHTML = `
          <div style="
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, ${style.from}, ${style.to});
            border-radius: 12px;
            flex-shrink: 0;
            box-shadow: 0 4px 14px ${style.from}55;
          "></div>
          <div style="flex: 1; min-width: 0;">
            <div style="font-weight: 700; color: var(--text); margin-bottom: 2px; font-size: 15px;">
              ${style.name}
            </div>
            <div style="font-size: 12px; color: var(--text-secondary);">
              Story 9:16
            </div>
          </div>
          <div style="display: flex; gap: 8px; flex-shrink: 0;">
            <button class="row-download-btn" title="Télécharger" aria-label="Télécharger" style="
              width: 42px; height: 42px; border-radius: 12px; border: none; cursor: pointer;
              display: flex; align-items: center; justify-content: center;
              background: var(--msg-item-bg, #f3f3f7); color: var(--text); transition: all 0.2s;
            ">${CARD_ICONS.download}</button>
            <button class="row-share-btn" title="Partager" aria-label="Partager" style="
              width: 42px; height: 42px; border-radius: 12px; border: none; cursor: pointer;
              display: flex; align-items: center; justify-content: center;
              background: ${style.to}; color: #fff; transition: all 0.2s;
            ">${CARD_ICONS.share}</button>
          </div>
        `;

        row.addEventListener('mouseenter', () => {
          row.style.borderColor = style.to;
          row.style.boxShadow = `0 8px 25px ${style.from}30`;
        });
        row.addEventListener('mouseleave', () => {
          row.style.borderColor = 'var(--border)';
          row.style.boxShadow = 'none';
        });

        const rowDownloadBtn = row.querySelector('.row-download-btn');
        const rowShareBtn = row.querySelector('.row-share-btn');
        const iconBtns = [rowDownloadBtn, rowShareBtn];

        rowDownloadBtn.addEventListener('click', () => handleCardAction('download', style, row, iconBtns));
        rowShareBtn.addEventListener('click', () => handleCardAction('share', style, row, iconBtns));

        selection.appendChild(row);
      });

      const closeBtn = modalContent.querySelector('#closeModal');
      closeBtn.addEventListener('click', () => {
        document.body.removeChild(modal);
      });

      modal.addEventListener('click', (e) => {
        if (e.target === modal) {
          document.body.removeChild(modal);
        }
      });
    };

    const createShareLink = (pseudo) => {
      const shareDiv = document.createElement('div');
      shareDiv.className = 'share-link';

      const shareUrl = `https://send-anonymous-messages.vercel.app/?to=${encodeURIComponent(pseudo)}`;

      shareDiv.innerHTML = `
        <p>📲 Partagez votre lien pour recevoir plus de messages :</p>
        <input type="text" value="${shareUrl}" readonly id="shareInput">
        <div class="share-buttons">
          <button class="btn btn-secondary" id="copyShare">📋 Copier</button>
        </div>
      `;

      messages.insertBefore(shareDiv, messages.firstChild);

      const copyBtn = $('copyShare');
      const shareInput = $('shareInput');

      copyBtn.addEventListener('click', async () => {
        try {
          await navigator.clipboard.writeText(shareUrl);
          const originalText = copyBtn.textContent;
          copyBtn.textContent = '✅ Copié !';
          copyBtn.style.background = 'var(--accent)';
          copyBtn.style.color = 'white';
          setTimeout(() => {
            copyBtn.textContent = originalText;
            copyBtn.style.background = '';
            copyBtn.style.color = '';
          }, 2000);
        } catch (err) {
          shareInput.select();
          shareInput.setSelectionRange(0, 99999);
          try {
            document.execCommand('copy');
            alert('✅ Lien copié ! Partagez sur Insta ou TikTok 🚀');
          } catch (e) {
            alert('⚠️ Impossible de copier. Copiez manuellement le lien.');
          }
        }
      });

      if (navigator.share) {
        const shareBtn = document.createElement('button');
        shareBtn.className = 'btn btn-secondary';
        shareBtn.textContent = '🚀 Partager';
        shareBtn.addEventListener('click', async () => {
          try {
            await navigator.share({
              title: 'Envoie-moi un message anonyme sur SIS',
              text: 'Dis-moi ce que tu penses vraiment 👀',
              url: shareUrl
            });
          } catch (err) {
            if (err.name !== 'AbortError') {
              console.error('Share error:', err);
            }
          }
        });
        shareDiv.querySelector('.share-buttons').appendChild(shareBtn);}
    };

    const loadMessages = async () => {
      if (!currentUser || !userPseudo) {
        showError('❌ Erreur', 'Utilisateur non connecté');
        return;
      }

      console.log('🔍 Recherche des messages pour:', userPseudo);
      setState(true);
      messages.innerHTML = '';

      try {
        // Utiliser "createdAt" au lieu de "timestamp" pour correspondre à l'autre fichier
        let q;
        try {
          q = query(
            collection(db, 'messages'),
            where('to', '==', userPseudo),
            orderBy('createdAt', 'desc')
          );
          
          const querySnapshot = await getDocs(q);
          console.log('📨 Messages trouvés avec index:', querySnapshot.size);

          if (querySnapshot.empty) {
            createShareLink(userPseudo);
            messages.innerHTML += `
              <div class="empty">
                📭 Aucun message pour le moment<br>
                Partage ton lien pour recevoir des messages anonymes !
              </div>
            `;
            setState(false);
            return;
          }

          createShareLink(userPseudo);
          displayMessages(querySnapshot);
          setState(false);

        } catch (indexError) {
          // Si l'erreur est due à l'index manquant
          if (indexError.code === 'failed-precondition') {
            console.log('⚠️ Index manquant, chargement sans tri...');
            
            // Extraire le lien de création d'index de l'erreur
            const errorMessage = indexError.message;
            const linkMatch = errorMessage.match(/https:\/\/console\.firebase\.google\.com[^\s]*/);
            const indexLink = linkMatch ? linkMatch[0] : null;

            // Charger sans orderBy (pas besoin d'index)
            q = query(
              collection(db, 'messages'),
              where('to', '==', userPseudo)
            );

            const querySnapshot = await getDocs(q);
            console.log('📨 Messages trouvés sans index:', querySnapshot.size);

            if (querySnapshot.empty) {
              createShareLink(userPseudo);
              messages.innerHTML += `
                <div class="empty">
                  📭 Aucun message pour le moment<br>
                  Partage ton lien pour recevoir des messages anonymes !
                </div>
              `;
              setState(false);
              return;
            }

            // Afficher l'avertissement avec le lien pour créer l'index
            createShareLink(userPseudo);
            if (indexLink) {
              showIndexWarning(indexLink);
            }

            // Trier manuellement les messages par date (createdAt)
            const messagesArray = [];
            querySnapshot.forEach((doc) => {
              messagesArray.push({ id: doc.id, data: doc.data() });
            });

            messagesArray.sort((a, b) => {
              const timeA = a.data.createdAt?.toDate?.() || new Date(a.data.createdAt || 0);
              const timeB = b.data.createdAt?.toDate?.() || new Date(b.data.createdAt || 0);
              return timeB - timeA;
            });

            displayMessagesFromArray(messagesArray);
            setState(false);

          } else {
            throw indexError;
          }
        }

      } catch (error) {
        console.error('❌ Erreur chargement messages:', error);
        setState(false);

        if (error.code === 'permission-denied') {
          showError(
            '❌ Accès refusé',
            'Tu n\'as pas les permissions pour lire les messages. Vérifie les règles Firestore dans Firebase Console.'
          );
        } else {
          showError(
            '❌ Erreur de chargement',
            `Impossible de charger les messages. Erreur: ${error.message}`
          );
        }
      }
    };

    const displayMessages = (querySnapshot) => {
      querySnapshot.forEach((doc) => {
        const data = doc.data();
        createMessageElement(doc.id, data);
      });
    };

    const displayMessagesFromArray = (messagesArray) => {
      messagesArray.forEach(({ id, data }) => {
        createMessageElement(id, data);
      });
    };

    
      const createMessageElement = (docId, data) => {
  const messageDiv = document.createElement('div');
  messageDiv.className = 'message';
  messageDiv.setAttribute('data-id', docId);

  messageDiv.innerHTML = `
    <div class="message-header"></div>
    <div class="message-content">
      <div class="message-text">${escapeHtml(data.message || '')}</div>
    </div>
    <div class="message-meta">
      <span>📅 ${formatDate(data.createdAt)}</span>
      <div class="message-actions">
        <button class="btn btn-secondary download-btn">${CARD_ICONS.download} Télécharger</button>
        <button class="btn btn-secondary share-btn">${CARD_ICONS.share} Partager</button>
      </div>
    </div>
  `;

  messages.appendChild(messageDiv);

  const downloadBtn = messageDiv.querySelector('.download-btn');
  downloadBtn.addEventListener('click', () => openCardModal(data, docId));

  const shareBtn = messageDiv.querySelector('.share-btn');
  shareBtn.addEventListener('click', () => openCardModal(data, docId));
}; loadBtn.addEventListener('click', loadMessages);

  </script>
</body>
